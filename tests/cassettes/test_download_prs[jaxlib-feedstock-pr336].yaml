          -1,65 +0,0 @@\n-migrator_ts: 1738229377\n-__migrator:\n-  kind:\n-    version\n-  migration_number:\n-    1\n-  build_number:\n-    1\n-  paused:
          false\n-  override_cbc_keys:\n-    - cuda_compiler_stub\n-  check_solvable:
          false\n-  primary_key: cuda_compiler_version\n-  # local override because
          we switch to clang\n-  use_local: true\n-  ordering:\n-    cuda_compiler_version:\n-      -
          12.4\n-      - 12.6\n-      - 12.8\n-      - None\n-      - 12.9\n-      #
          to allow manual opt-in for CUDA 11.8, see\n-      # https://github.com/conda-forge/conda-forge-pinning-feedstock/pull/7472\n-      #
          must be last due to how cuda_compiler ordering in that migrator works\n-      -
          11.8\n-  commit_message: |\n-    Upgrade to CUDA 12.9\n-    \n-    CUDA 12.8
          added support for architectures `sm_100`, `sm_101` and `sm_120`,\n-    while
          CUDA 12.9 further added `sm_103` and `sm_121`. To build for these,\n-    maintainers
          will need to modify their existing list of specified architectures\n-    (e.g.
          `CMAKE_CUDA_ARCHITECTURES`, `TORCH_CUDA_ARCH_LIST`, etc.)\n-    for their
          package. A good balance between broad support and storage\n-    footprint
          (resp. compilation time) is to add `sm_100` and `sm_120`.\n-    \n-    Since
          CUDA 12.8, the conda-forge nvcc package now sets `CUDAARCHS` and\n-    `TORCH_CUDA_ARCH_LIST`
          in its activation script to a string containing all\n-    of the supported
          real architectures plus the virtual architecture of the\n-    latest. Recipes
          for packages who use these variables to control their build\n-    but do not
          want to build for all supported architectures will need to override\n-    these
          variables in their build script.\n-    \n-    ref: https://docs.nvidia.com/cuda/cuda-toolkit-release-notes/index.html#new-features\n-\n-c_stdlib_version:              #
          [(linux and (x86_64 or aarch64)) and os.environ.get(\"CF_CUDA_ENABLED\", \"False\")
          == \"True\"]\n-  - 2.17                       # [(linux and (x86_64 or aarch64))
          and os.environ.get(\"CF_CUDA_ENABLED\", \"False\") == \"True\"]\n-\n-cuda_compiler_version:         #
          [((linux and (x86_64 or aarch64)) or win64) and os.environ.get(\"CF_CUDA_ENABLED\",
          \"False\") == \"True\"]\n-  - 12.9                       # [((linux and (x86_64
          or aarch64)) or win64) and os.environ.get(\"CF_CUDA_ENABLED\", \"False\")
          == \"True\"]\n-\n-cuda_compiler_version_min:     # [((linux and (x86_64 or
          aarch64)) or win64) and os.environ.get(\"CF_CUDA_ENABLED\", \"False\") ==
          \"True\"]\n-  - 12.9                       # [((linux and (x86_64 or aarch64))
          or win64) and os.environ.get(\"CF_CUDA_ENABLED\", \"False\") == \"True\"]\n-\n-cudnn:                         #
          [((linux and (x86_64 or aarch64)) or win64) and os.environ.get(\"CF_CUDA_ENABLED\",
          \"False\") == \"True\"]\n-  - 9                          # [((linux and (x86_64
