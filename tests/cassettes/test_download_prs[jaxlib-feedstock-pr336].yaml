          -1,34 +0,0 @@\n-# needs to be ordered before CUDA 13.0 migrator\n-migrator_ts:
          1755016000\n-__migrator:\n-  kind:\n-    version\n-  migration_number:\n-    1\n-  build_number:\n-    1\n-  ordering:\n-    cudnn:\n-      -
          None\n-      - 9\n-      - 9.10\n-  commit_message: |\n-    Rebuild for cudnn
          9.10\n-    \n-    Conda-forge assumed cudnn 9.x builds would stay compatible
          with each other.\n-    This is the case for the API/ABI of the library, but
          nvidia dropped support\n-    for older GPU architectures in cudnn 9.11. Since
          we have no package-level\n-    metadata about compatibility with specific
          GPU architectures, this effectively\n-    breaks all packages built atop cudnn
          for users on affected older GPUs.\n-    \n-    In order to remedy this situation,
          we need to rebuild all cudnn-dependent\n-    feedstocks against cudnn 9.10
          (the last version with full architecture support),\n-    before we mark all
          those newer cudnn builds as broken. This only affects artefacts\n-    for
          CUDA 12.x; those for CUDA 13.x are not affected, since CUDA 13 never supported\n-    those
          older architectures in the first place.\n-    \n-    For more details see:
          https://github.com/conda-forge/cudnn-feedstock/issues/124\n-\n-cudnn:\n-  -
          None\n-  - 9.10                       # [((linux and not ppc64le) or win64)
          and os.environ.get(\"CF_CUDA_ENABLED\", \"False\") == \"True\"]"},{"sha":"c08dd7d291344be93b491add155a4373130e4999","filename":".ci_support/osx_64_python3.11.____cpython.yaml","status":"modified","additions":0,"deletions":2,"changes":2,"blob_url":"https://github.com/conda-forge/jaxlib-feedstock/blob/73c732d64c89c6295185f8c7809079a0cf01741c/.ci_support%2Fosx_64_python3.11.____cpython.yaml","raw_url":"https://github.com/conda-forge/jaxlib-feedstock/raw/73c732d64c89c6295185f8c7809079a0cf01741c/.ci_support%2Fosx_64_python3.11.____cpython.yaml","contents_url":"https://api.github.com/repos/conda-forge/jaxlib-feedstock/contents/.ci_support%2Fosx_64_python3.11.____cpython.yaml?ref=73c732d64c89c6295185f8c7809079a0cf01741c","patch":"@@
