          ,\"description\":\"### Continuously build, test, and deploy to any platform\
          \ and cloud\\r\\n\\r\\n[Azure Pipelines](https://azure.microsoft.com/services/devops/pipelines/)\
          \ offers cloud-hosted pipelines for Linux, macOS, and Windows with 10 free\
          \ parallel jobs and unlimited minutes for open source projects.\\r\\n\\r\\\
          n:v: **Any language, platform, and cloud**\\r\\nBuild, test, and deploy Node.js,\
          \ Python, \LJava, PHP, Ruby, Go, C/C++, C#, Android, and iOS apps. Run in\
          \ parallel on Linux, macOS, and Windows. Deploy to cloud providers like Azure,\
          \ AWS, and GCP. Distribute mobile apps through beta channels and app stores.\\\
          r\\n\\r\\n:whale2: **Native container support**\\r\\nCreate new containers\
          \ with ease and push them to any registry. Deploy containers to independent\
          \ hosts or Kubernetes.\\r\\n\\r\\n:muscle: **Advanced workflows and features**\\\
          r\\nEasy build chaining and multi-phased builds. Support for YAML, test integration,\
          \ release gates, reporting, and more.\\r\\n\\r\\n:wrench: **Extensible**\\\
          r\\nUse a range of build, test, and deployment tasks built by the community\
          \ \u2013 hundreds of extensions from Slack to SonarCloud. You can even deploy\
          \ from other CI systems, like Jenkins. Webhooks and REST APIs help you integrate.\\\
          r\\n\\r\\n:blue_heart: **Free, to you from Azure Pipelines**\\r\\nFree cloud-hosted\
