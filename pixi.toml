[workspace]
name = "cf-job-logs"
channels = ["conda-forge"]
exclude-newer = "7d"
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[tasks]
cf-job-logs = "cf-job-logs"

[package]
name = "cf-job-logs"
[package.build.backend]
name = "pixi-build-python"
version = "*"
[package.host-dependencies]
python = ">=3.13"
hatchling = "*"
uv = "*"

[package.run-dependencies]
python = ">=3.13"
pydantic = ">=2.12.5,<3"
httpx = ">=0.28.1,<0.29"
click = ">=8.0.0,<9"

[dependencies]
cf-job-logs = { path = "." }

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-asyncio = ">=1.3.0,<2"
pytest-vcr = "*"
mypy = "*"
typing_extensions = "*"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=cf_job_logs --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python = "*"
hatchling = "*"
python-build = "*"
twine = ">=6"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
lefthook = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
zizmor = "*"
[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"

[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = ["test", "build", "lint"]
py313 = ["py313", "test"]
py314 = ["py314", "test"]
